# This workflow runs SonarCloud PR scans for use in CLI testing.
# SonarCloud automatically deletes PR scan results after 4 weeks.

name: SonarCloud PR Scan

on:
  pull_request:

env:
  SONARCLOUD_PROJECT_KEY: ${{ github.repository_owner }}_${{ github.event.repository.name }}

jobs:

  sonarcloud-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run SonarCloud scan
        env:
          SONAR_TOKEN: ${{ secrets.SONARCLOUD_TOKEN }}
        uses: SonarSource/sonarqube-scan-action@v6.0.0

      - name: Write step summary
        run: |
          echo "### SonarCloud PR Scan" >> "${GITHUB_STEP_SUMMARY}"
          echo "- **Project:** ${SONARCLOUD_PROJECT_KEY}" >> "${GITHUB_STEP_SUMMARY}"
          echo "- **PR:** #${{ github.event.pull_request.number }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "- **Results:** [SonarCloud](https://sonarcloud.io/summary/overall?id=${SONARCLOUD_PROJECT_KEY}&pullRequest=${{ github.event.pull_request.number }})" >> "${GITHUB_STEP_SUMMARY}"
